<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easebuzz PayIn Testing Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            display: block;
        }
        
        .result.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            display: block;
        }
        
        .result h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .result-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            font-weight: 600;
            color: #555;
            display: inline-block;
            width: 120px;
        }
        
        .result-value {
            color: #333;
        }
        
        .payment-link {
            display: block;
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            text-align: center;
        }
        
        .payment-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
        }
        
        .payment-link a:hover {
            text-decoration: underline;
        }
        
        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Easebuzz PayIn Testing</h1>
        <div class="subtitle">Test your payment integration in real-time</div>
        
        <div class="info-box">
            <strong>ℹ️ Info:</strong> This tool tests the Easebuzz payment gateway integration. Enter customer details below to initiate a test payment.
        </div>
        
        <form id="payinForm">
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" id="amount" name="amount" value="100" min="1" required>
            </div>
            
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="name" name="name" value="Test User" required>
            </div>
            
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" value="9112345322" pattern="[0-9]{10}" required>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Initiate Payment</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your request...</p>
        </div>
        
        <div class="result" id="result"></div>
    </div>
    
    <script>
        const form = document.getElementById('payinForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form data
            const amount = document.getElementById('amount').value;
            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            
            // Generate unique order ID
            const orderid = 'EBZ' + Date.now() + Math.floor(Math.random() * 10000);
            
            // Show loading
            submitBtn.disabled = true;
            loading.classList.add('active');
            result.style.display = 'none';
            
            try {
                const response = await fetch('https://merchant.dhankubera.com/api/pg/urbanpay/initiate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        token: '$2y$10$.m4TS9M8FNfQt7w0r3VOrOPXgQa8p0.IrLpeEz80IBUJPlHfbpkxm',
                        userid: 'GWS1115',
                        amount: amount,
                        mobile: mobile,
                        name: name,
                        orderid: orderid.substring(0, 20), // Max 20 chars
                        callback_url: 'https://merchant.dhankubera.com/api/gateway/easebuzz/callback'
                    })
                });
                
                const data = await response.json();
                
                // Hide loading
                loading.classList.remove('active');
                submitBtn.disabled = false;
                
                if (data.status) {
                    // Success
                    result.className = 'result success';
                    result.innerHTML = `
                        <h3>✅ Payment Initiated Successfully!</h3>
                        <div class="result-item">
                            <span class="result-label">Order ID:</span>
                            <span class="result-value">${orderid.substring(0, 20)}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Amount:</span>
                            <span class="result-value">₹${data.amount || amount}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Tax:</span>
                            <span class="result-value">₹${data.tax || '0.00'}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Gateway:</span>
                            <span class="result-value">Easebuzz</span>
                        </div>
                        ${data.url || data.payment_url ? `
                        <div class="payment-link">
                            <strong>Payment Link:</strong><br><br>
                            <a href="${data.url || data.payment_url}" target="_blank">
                                Open Payment Page →
                            </a>
                        </div>
                        ` : ''}
                    `;
                } else {
                    // Error
                    result.className = 'result error';
                    result.innerHTML = `
                        <h3>❌ Payment Initiation Failed</h3>
                        <div class="result-item">
                            <span class="result-label">Message:</span>
                            <span class="result-value">${data.message || 'Unknown error'}</span>
                        </div>
                    `;
                }
                
            } catch (error) {
                loading.classList.remove('active');
                submitBtn.disabled = false;
                
                result.className = 'result error';
                result.innerHTML = `
                    <h3>❌ Request Failed</h3>
                    <div class="result-item">
                        <span class="result-label">Error:</span>
                        <span class="result-value">${error.message}</span>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
